<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcginn.co</title>
<meta name="description" content="John McGinn — portfolio in progress.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="assets/jm.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111111;
    --paper: #ffffff;
    --margin: clamp(20px, 4vw, 48px);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: geometricPrecision;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: var(--margin);
    opacity: 0;
    animation: fade 800ms ease-out 120ms forwards;
  }

  @keyframes fade {
    to { opacity: 1; }
  }

  header svg {
    width: 56px;
    height: auto;
    display: block;
    color: var(--ink);
  }

  main {
    /* intentionally empty — let the negative space carry the page */
  }

  footer {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta {
    font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.55;
  }

  .contact {
    font-size: 15px;
    font-weight: 500;
    line-height: 1;
  }

  .contact a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms ease;
  }

  .contact a:hover,
  .contact a:focus-visible {
    border-bottom-color: var(--ink);
    outline: none;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #f2f2f0;
      --paper: #0a0a0a;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    body { animation: none; opacity: 1; }
  }
</style>
</head>
